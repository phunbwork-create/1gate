# ─────────────────────────────────────────────────
# 1Gate Docker Compose — Production Stack
# App + PostgreSQL + Persistent Volumes
# ─────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onegate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-OneGate@2026!}
      POSTGRES_DB: ${POSTGRES_DB:-onegate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onegate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 1Gate Application ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database — direct postgres connection (no Prisma Accelerate proxy)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-onegate}:${POSTGRES_PASSWORD:-OneGate@2026!}@db:5432/${POSTGRES_DB:-onegate}?schema=public"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-onegate}:${POSTGRES_PASSWORD:-OneGate@2026!}@db:5432/${POSTGRES_DB:-onegate}?schema=public"

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # Optional services
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-noreply@1gate.app}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_DEFAULT_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID:-}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
