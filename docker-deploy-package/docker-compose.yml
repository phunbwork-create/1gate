# ─────────────────────────────────────────────────
# 1Gate Docker Compose — Production Deployment
# Chỉ cần file này + .env để deploy trên VPS
# Không yêu cầu source code trên server
# ─────────────────────────────────────────────────
# Usage:
#   1. Cấu hình .env (copy từ .env.example)
#   2. docker compose pull
#   3. docker compose up -d
# ─────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onegate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-onegate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onegate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 1Gate Application ────────────────────────────
  app:
    image: ${IMAGE_NAME:-1gate-app}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER:-onegate}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-onegate}?schema=public"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-onegate}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-onegate}?schema=public"

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # Optional services
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-noreply@1gate.app}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_DEFAULT_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID:-}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
